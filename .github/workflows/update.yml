name: Curate Links

on:
  schedule:
    - cron: '0 11 * * *'   # 6:00 AM ET (11am UTC)
  workflow_dispatch:        # also triggerable manually from the Actions tab

permissions:
  contents: write           # needed to push updated index.html

jobs:
  curate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run curator
        run: python curator.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated page
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html seen.json
          git diff --staged --quiet || git commit -m "Refresh links $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
